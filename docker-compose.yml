services:
  backend:
    build:
      context: ./backend
    container_name: railway-annotator-backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    volumes:
      - ${DATASET_HOST_PATH:-./dataset}:/data/dataset
      - ${EXPORTS_HOST_PATH:-./exports}:/data/exports
      - ${MODELS_HOST_PATH:-./models}:/data/models
      - logs_data:/app/logs
    environment:
      - DATASET_PATH=/data/dataset
      - EXPORTS_PATH=/data/exports
      - MODELS_PATH=/data/models
      - SAM_CHECKPOINT=/data/models/sam2.1_hiera_large.pt
    # GPU passthrough is available on this host (nvidia-container-toolkit configured),
    # but the pinned torch==2.5.1 wheel installed from PyPI on aarch64 is CPU-only —
    # there is no CUDA build for this platform on PyPI. Re-enable once a matching
    # CUDA-enabled torch wheel (e.g. NVIDIA's own aarch64 build) is wired in.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
    container_name: railway-annotator-frontend
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  logs_data:
