services:
  backend:
    build:
      context: ./backend
    container_name: railway-annotator-backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    volumes:
      - dataset_data:/data/dataset
      - exports_data:/data/exports
      - models_data:/data/models
      - logs_data:/app/logs
    environment:
      - DATASET_PATH=/data/dataset
      - EXPORTS_PATH=/data/exports
      - MODELS_PATH=/data/models
      - SAM_CHECKPOINT=/data/models/sam2.1_hiera_large.pt
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
    container_name: railway-annotator-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  dataset_data:
  exports_data:
  models_data:
  logs_data:
