services:
  backend:
    build:
      context: ./backend
    container_name: railway-annotator-backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    volumes:
      # Hardcoded absolute host paths rather than ${VAR}-interpolated ones:
      # Coolify injects its UI-configured env vars straight into the
      # container, but does not write them into a .env file for compose's
      # own variable-substitution pass, so ${DATASET_HOST_PATH} silently
      # fell back to its default and resolved relative to Coolify's managed
      # app directory instead of the real dataset. This is a single fixed
      # host deployment, so hardcoding is simplest and actually correct.
      - /home/omronix/Component/annotation_dataset:/data/dataset
      - /home/omronix/Component/annotation_tool/exports:/data/exports
      - /home/omronix/Component/annotation_tool/models:/data/models
      - logs_data:/app/logs
    environment:
      - DATASET_PATH=/data/dataset
      - EXPORTS_PATH=/data/exports
      - MODELS_PATH=/data/models
      - SAM_CHECKPOINT=/data/models/sam2.1_hiera_large.pt
      - SAM_MODEL_CFG=configs/sam2.1/sam2.1_hiera_l.yaml
    # GPU passthrough via nvidia-container-toolkit; the backend image now installs
    # a CUDA-enabled (cu128) torch build with Blackwell (sm_121) kernels for this
    # host's GB10 GPU. sam_device=auto picks it up automatically when available.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
    container_name: railway-annotator-frontend
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  logs_data:
